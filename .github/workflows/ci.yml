name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          cache: pnpm
          node-version: 26

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Coverage
        run: pnpm coverage

      - name: Build
        run: pnpm build
